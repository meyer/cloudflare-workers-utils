name: Release

on:
  push:
    branches:
      - main

# Publishing uses npm trusted publishing (OIDC) instead of a long-lived token.
# `id-token: write` lets the job mint the OIDC token npm exchanges for short-lived
# credentials and provenance attestations. contents/pull-requests are for the
# changesets release PR.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  canary:
    name: Create and publish a new release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          commit: Bump versions
          title: Bump versions
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # When changesets are pending, the action only opens/updates the "Bump
      # versions" PR (no real publish) — that's the non-publish push where we
      # want a canary. Once that PR merges there are no changesets left, the
      # action publishes the real versions, and this step is skipped.
      # (Don't gate on `outputs.published`: the action can't detect a `pnpm
      # publish` and always reports it false, which fired canary after a real
      # release and 403'd trying to republish the same version.)
      - name: Publishing canary release
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          git checkout main
          pnpm version:canary
          pnpm release:canary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
