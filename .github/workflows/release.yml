name: Release

on:
  push:
    branches:
      - main

# Publishing uses npm trusted publishing (OIDC) instead of a long-lived token.
# `id-token: write` lets the job mint the OIDC token npm exchanges for short-lived
# credentials and provenance attestations. contents/pull-requests are for the
# changesets release PR.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  canary:
    name: Create and publish a new release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          commit: Bump versions
          title: Bump versions
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publishing canary release
        if: steps.changesets.outputs.published != 'true'
        run: |
          git checkout main
          pnpm version:canary
          pnpm release:canary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
